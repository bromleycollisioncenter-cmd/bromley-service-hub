openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bromley Hub - Auto Parts Tracking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: customers
    description: Customer operations
  - name: parts
    description: Part operations
  - name: dashboard
    description: Dashboard summary
  - name: search
    description: Search operations
  - name: vehicles
    description: Vehicle/job operations
  - name: estimateParts
    description: Estimate part operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search customers
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer with their parts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer with parts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDetail"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /customers/{customerId}/parts:
    post:
      operationId: addPart
      tags: [parts]
      summary: Add a part to a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartInput"
      responses:
        "201":
          description: Created part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Part"

  /parts/{id}:
    patch:
      operationId: updatePart
      tags: [parts]
      summary: Update a part
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartUpdate"
      responses:
        "200":
          description: Updated part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Part"
        "404":
          description: Not found
    delete:
      operationId: deletePart
      tags: [parts]
      summary: Delete a part
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles / jobs
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle with estimate and parts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDetail"
        "404":
          description: Not found
    patch:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update vehicle status or fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found

  /estimate-parts/{id}:
    patch:
      operationId: updateEstimatePart
      tags: [estimateParts]
      summary: Update ordered/received/installed status of an estimate part
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimatePartUpdate"
      responses:
        "200":
          description: Updated estimate part
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimatePart"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    PartStatus:
      type: string
      enum: [received, waiting, backordered]

    CustomerStatus:
      type: string
      enum: [all_received, waiting, backordered]

    VehicleStatus:
      type: string
      enum: [waiting_on_parts, in_repair, ready, complete, delivered]

    Part:
      type: object
      required: [id, customerId, name, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        customerId:
          type: integer
        name:
          type: string
        partNumber:
          type: ["string", "null"]
        vendor:
          type: ["string", "null"]
        dateOrdered:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/PartStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PartInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        partNumber:
          type: ["string", "null"]
        vendor:
          type: ["string", "null"]
        dateOrdered:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/PartStatus"

    PartUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        partNumber:
          type: ["string", "null"]
        vendor:
          type: ["string", "null"]
        dateOrdered:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/PartStatus"

    Customer:
      type: object
      required: [id, name, status, updatedAt, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        vehicleYear:
          type: ["integer", "null"]
        vehicleMake:
          type: ["string", "null"]
        vehicleModel:
          type: ["string", "null"]
        roNumber:
          type: ["string", "null"]
        insuranceCompany:
          type: ["string", "null"]
        claimNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/CustomerStatus"
        partsTotal:
          type: integer
        partsReceived:
          type: integer
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    CustomerDetail:
      type: object
      required: [id, name, status, parts, partsTotal, partsReceived, updatedAt, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        vehicleYear:
          type: ["integer", "null"]
        vehicleMake:
          type: ["string", "null"]
        vehicleModel:
          type: ["string", "null"]
        roNumber:
          type: ["string", "null"]
        insuranceCompany:
          type: ["string", "null"]
        claimNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/CustomerStatus"
        parts:
          type: array
          items:
            $ref: "#/components/schemas/Part"
        partsTotal:
          type: integer
        partsReceived:
          type: integer
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: ["string", "null"]
        vehicleYear:
          type: ["integer", "null"]
        vehicleMake:
          type: ["string", "null"]
        vehicleModel:
          type: ["string", "null"]
        roNumber:
          type: ["string", "null"]
        insuranceCompany:
          type: ["string", "null"]
        claimNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: ["string", "null"]
        vehicleYear:
          type: ["integer", "null"]
        vehicleMake:
          type: ["string", "null"]
        vehicleModel:
          type: ["string", "null"]
        roNumber:
          type: ["string", "null"]
        insuranceCompany:
          type: ["string", "null"]
        claimNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    DashboardStats:
      type: object
      required: [openCustomers, partsReceivedToday, customersWaitingOnParts, jobsReadyToComplete, recentlyUpdated]
      properties:
        openCustomers:
          type: integer
        partsReceivedToday:
          type: integer
        customersWaitingOnParts:
          type: integer
        jobsReadyToComplete:
          type: integer
        recentlyUpdated:
          type: array
          items:
            $ref: "#/components/schemas/Customer"

    ImportResult:
      type: object
      required: [customersCreated, customersUpdated, partsCreated, partsUpdated, partsSkipped]
      properties:
        customersCreated:
          type: integer
        customersUpdated:
          type: integer
        partsCreated:
          type: integer
        partsUpdated:
          type: integer
        partsSkipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    EstimatePart:
      type: object
      required: [id, vehicleId, estimateId, description, ordered, received, installed, createdAt, updatedAt]
      properties:
        id:
          type: integer
        vehicleId:
          type: integer
        estimateId:
          type: integer
        lineNumber:
          type: ["integer", "null"]
        operation:
          type: ["string", "null"]
        description:
          type: string
        partNumber:
          type: ["string", "null"]
        quantity:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        laborHours:
          type: ["string", "null"]
        paintHours:
          type: ["string", "null"]
        ordered:
          type: boolean
        received:
          type: boolean
        installed:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EstimatePartUpdate:
      type: object
      properties:
        ordered:
          type: boolean
        received:
          type: boolean
        installed:
          type: boolean

    EstimateDocument:
      type: object
      required: [id, vehicleId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        vehicleId:
          type: integer
        workfileId:
          type: ["string", "null"]
        jobNumber:
          type: ["string", "null"]
        estimateDate:
          type: ["string", "null"]
        pdfFilename:
          type: ["string", "null"]
        totalAmount:
          type: ["string", "null"]
        bodyLaborHours:
          type: ["string", "null"]
        paintLaborHours:
          type: ["string", "null"]
        paintSupplies:
          type: ["string", "null"]
        bodySupplies:
          type: ["string", "null"]
        miscellaneous:
          type: ["string", "null"]
        tax:
          type: ["string", "null"]
        grandTotal:
          type: ["string", "null"]
        deductible:
          type: ["string", "null"]
        customerPay:
          type: ["string", "null"]
        insurancePay:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Vehicle:
      type: object
      required: [id, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        workfileId:
          type: ["string", "null"]
        jobNumber:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        make:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        trim:
          type: ["string", "null"]
        vin:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        mileage:
          type: ["string", "null"]
        insuranceCompany:
          type: ["string", "null"]
        claimNumber:
          type: ["string", "null"]
        policyNumber:
          type: ["string", "null"]
        dateOfLoss:
          type: ["string", "null"]
        estimator:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/VehicleStatus"
        estimateTotal:
          type: ["string", "null"]
        insurancePay:
          type: ["string", "null"]
        customerPay:
          type: ["string", "null"]
        deductible:
          type: ["string", "null"]
        partsTotal:
          type: integer
        partsOrdered:
          type: integer
        partsReceived:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleDetail:
      type: object
      required: [id, status, parts, createdAt, updatedAt]
      properties:
        id:
          type: integer
        workfileId:
          type: ["string", "null"]
        jobNumber:
          type: ["string", "null"]
        customerId:
          type: ["integer", "null"]
        customerName:
          type: ["string", "null"]
        customerPhone:
          type: ["string", "null"]
        year:
          type: ["integer", "null"]
        make:
          type: ["string", "null"]
        model:
          type: ["string", "null"]
        trim:
          type: ["string", "null"]
        vin:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        mileage:
          type: ["string", "null"]
        insuranceCompany:
          type: ["string", "null"]
        claimNumber:
          type: ["string", "null"]
        policyNumber:
          type: ["string", "null"]
        dateOfLoss:
          type: ["string", "null"]
        estimator:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/VehicleStatus"
        estimateTotal:
          type: ["string", "null"]
        insurancePay:
          type: ["string", "null"]
        customerPay:
          type: ["string", "null"]
        deductible:
          type: ["string", "null"]
        estimate:
          anyOf:
            - $ref: "#/components/schemas/EstimateDocument"
            - type: "null"
        parts:
          type: array
          items:
            $ref: "#/components/schemas/EstimatePart"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleUpdate:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/VehicleStatus"
        jobNumber:
          type: ["string", "null"]
        insuranceCompany:
          type: ["string", "null"]
        claimNumber:
          type: ["string", "null"]
        policyNumber:
          type: ["string", "null"]
        estimator:
          type: ["string", "null"]
        mileage:
          type: ["string", "null"]
