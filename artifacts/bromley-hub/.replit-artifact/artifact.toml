kind = "web"
previewPath = "/"
title = "Bromley Hub"
version = "1.0.0"
id = "artifacts/bromley-hub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20809

[services.development]
run = "pnpm --filter @workspace/bromley-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bromley-hub", "run", "build" ]
serve = "static"
publicDir = "artifacts/bromley-hub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20809"
BASE_PATH = "/"
